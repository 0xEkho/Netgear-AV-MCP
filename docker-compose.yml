services:
  mcp-server:
    build: .
    ports:
      - "${MCP_PORT:-8082}:8082"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
